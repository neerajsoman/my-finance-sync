name: Daily Bank Sync

on:
  schedule:
    - cron: '0 14 * * *' # 7 AM PT
  workflow_dispatch:      # Allows manual testing

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sheetlink CLI
        run: npm install -g sheetlink

      - name: Authenticate and Sync
        env:
          SHEETLINK_API_KEY: ${{ secrets.SHEETLINK_API_KEY }}
        run: |
          # 1. Authenticate the CLI for this headless session
          sheetlink auth --api-key $SHEETLINK_API_KEY
          
          # 2. Run the sync (defaults to your linked Google Sheet in MAX)
          sheetlink sync
